<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2003</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg {
            position: fixed; inset: 0;
            background-image: url('2003.png');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
        }

        .crt {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 3px;
            pointer-events: none; z-index: 10;
        }
        .crt::after {
            content: ''; display: block; position: absolute; inset: 0;
            background: radial-gradient(rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
        }

        .wrapper {
            position: relative; z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .year-heading {
            font-family: 'VT323', monospace;
            font-size: 7rem;
            color: #fff;
            letter-spacing: 16px;
            text-shadow: 0 0 30px rgba(255,255,255,0.25);
            line-height: 1;
        }

        .countdown-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .countdown-label {
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 6px;
        }
        .countdown-timer {
            font-family: 'VT323', monospace;
            font-size: 3.5rem;
            color: #ccc;
            letter-spacing: 6px;
        }
        .countdown-timer .sep { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* Calendar block */
        .cal-block {
            background: rgba(0,0,0,0.85);
            border: 1px solid #333;
            padding: 28px 32px;
            width: 440px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .cal-arrow {
            font-family: 'VT323', monospace;
            font-size: 2.4rem;
            color: #666;
            cursor: pointer;
            padding: 0 8px;
            user-select: none;
            transition: color 0.15s;
            line-height: 1;
        }
        .cal-arrow:hover { color: #fff; }

        .cal-month-name {
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            letter-spacing: 6px;
            color: #fff;
        }

        .day-headers {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 8px;
        }
        .day-header {
            text-align: center;
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 2px;
            padding: 4px 0;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: #555;
            border: 1px solid transparent;
            cursor: default;
        }

        .day-cell.has-day:hover {
            border-color: #444;
            color: #bbb;
        }

        .day-cell.today {
            color: #fff !important;
            border-color: #fff !important;
            background: rgba(255,255,255,0.07);
        }

        .day-cell.special {
            color: #f0f !important;
            border-color: #f0f !important;
            background: rgba(255,0,255,0.06);
            position: relative;
        }

        .day-cell.special::after {
            content: '2003';
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid #f0f;
            color: #f0f;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 3px;
            padding: 2px 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 20;
        }

        .day-cell.special:hover::after { opacity: 1; }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .enter-link {
            font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
            color: #444; letter-spacing: 4px; cursor: pointer;
            transition: color 0.2s; text-align: center; user-select: none;
        }
        .enter-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="crt"></div>

<div class="wrapper">
    <div class="year-heading">2003</div>

    <div class="countdown-wrap">
        <div class="countdown-label">DAY ENDS IN</div>
        <div class="countdown-timer">
            <span id="cd-h">--</span><span class="sep">:</span><span id="cd-m">--</span><span class="sep">:</span><span id="cd-s">--</span>
        </div>
    </div>

    <div class="cal-block">
        <div class="cal-header">
            <div class="cal-arrow" id="prev-btn">&#8592;</div>
            <div class="cal-month-name" id="month-name">JANUARY</div>
            <div class="cal-arrow" id="next-btn">&#8594;</div>
        </div>
        <div class="day-headers">
            <div class="day-header">SUN</div>
            <div class="day-header">MON</div>
            <div class="day-header">TUE</div>
            <div class="day-header">WED</div>
            <div class="day-header">THU</div>
            <div class="day-header">FRI</div>
            <div class="day-header">SAT</div>
        </div>
        <div class="days-grid" id="days-grid"></div>
    </div>

    <div class="nav-links">
        <div class="enter-link" onclick="window.location.href='/console'">SOURCEEXPLORER ›</div>
        <div class="enter-link" onclick="window.location.href='/chat'">CHAT ›</div>
    </div>
</div>

<script>
const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

const now = new Date();
const THIS_YEAR  = now.getFullYear();
const THIS_MONTH = now.getMonth();
const THIS_DAY   = now.getDate();

let viewMonth = THIS_MONTH;

function renderCalendar() {
    document.getElementById('month-name').textContent = MONTHS[viewMonth];

    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const firstDay    = new Date(THIS_YEAR, viewMonth, 1).getDay();
    const daysInMonth = new Date(THIS_YEAR, viewMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell';
        grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell has-day';
        cell.textContent = String(d).padStart(2, '0');

        if (viewMonth < THIS_MONTH || (viewMonth === THIS_MONTH && d < THIS_DAY)) {
            cell.classList.add('past');
        } else if (viewMonth === THIS_MONTH && d === THIS_DAY) {
            cell.classList.add('today');
        } else {
            cell.classList.add('future');
        }

        // April 25 special marker
        if (viewMonth === 3 && d === 25) {
            cell.classList.remove('past','future','today');
            cell.classList.add('special');
        }

        grid.appendChild(cell);
    }
}

document.getElementById('prev-btn').addEventListener('click', () => {
    viewMonth = (viewMonth - 1 + 12) % 12;
    renderCalendar();
});

document.getElementById('next-btn').addEventListener('click', () => {
    viewMonth = (viewMonth + 1) % 12;
    renderCalendar();
});

renderCalendar();

// Countdown to midnight
function updateCountdown() {
    const n = new Date();
    const midnight = new Date(n);
    midnight.setHours(24, 0, 0, 0);
    const diff = Math.max(0, Math.floor((midnight - n) / 1000));
    document.getElementById('cd-h').textContent = String(Math.floor(diff / 3600)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600) / 60)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(diff % 60).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
