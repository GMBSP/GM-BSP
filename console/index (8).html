<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOURCEEXPLORER - CONSOLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
        }

        /* Background image */
        .bg-checker {
            position: fixed;
            inset: 0;
            background-image: url('/background.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* CRT */
        .crt-effect {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        .crt-effect::after {
            content: " ";
            display: block;
            position: absolute;
            inset: 0;
            background: radial-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.45) 100%),
                        rgba(18,16,16,0.08);
            pointer-events: none;
        }
        .crt-scanline {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 120px;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(255,255,255,0.03) 40%,
                rgba(255,255,255,0.06) 50%,
                rgba(255,255,255,0.03) 60%,
                transparent 100%
            );
            animation: scan 7s linear infinite;
            pointer-events: none;
            z-index: 11;
        }
        @keyframes scan {
            0%   { top: -120px; }
            100% { top: 100vh; }
        }
        .crt-glitch-band {
            position: fixed;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            background: rgba(255,0,255,0.06);
            opacity: 0;
        }
        .crt-glitch-band.active {
            animation: glitch-anim 0.15s steps(1) forwards;
        }
        @keyframes glitch-anim {
            0%   { clip-path: inset(40% 0 60% 0); transform: translate(-4px,0); opacity:0.7; }
            25%  { clip-path: inset(10% 0 85% 0); transform: translate(4px,0);  opacity:0.8; }
            50%  { clip-path: inset(70% 0 20% 0); transform: translate(-2px,0); opacity:0.6; }
            75%  { clip-path: inset(30% 0 50% 0); transform: translate(3px,0);  opacity:0.9; }
            100% { clip-path: inset(0 0 100% 0);  transform: translate(0,0);    opacity:0;   }
        }

        /* ===== CONSOLE PAGE ===== */
    #console-page {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        justify-content: center;
        align-items: center;
        background: #000;
    }
    #console-page.active { display: flex; }

    #console-bg {
        position: absolute;
        inset: 0;
        background-image: url("BACKGROUND.png");
        background-size: cover;
        background-position: center;
        opacity: 0.18;
        z-index: 0;
    }

    #console-wrap {
        position: relative;
        z-index: 20;
        width: 880px;
        max-width: 96vw;
        height: 580px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    #console-titlebar {
        background: #1a1a1a;
        border: 1px solid #333;
        border-bottom: none;
        padding: 5px 10px;
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        color: #888;
        letter-spacing: 1px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }

    #console-close {
        cursor: pointer;
        color: #555;
        font-size: 14px;
        transition: color 0.1s;
    }
    #console-close:hover { color: #cc0000; }

    #console-output {
        background: #1c1c1c;
        border: 1px solid #333;
        border-bottom: none;
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        color: #c0c0c0;
        line-height: 1.6;
        scroll-behavior: smooth;
    }
    #console-output::-webkit-scrollbar { width: 6px; }
    #console-output::-webkit-scrollbar-track { background: #111; }
    #console-output::-webkit-scrollbar-thumb { background: #333; }

    .con-line { white-space: pre-wrap; word-break: break-all; }
    .con-line.echo { color: #fff; }
    .con-line.response { color: #c0c0c0; }
    .con-line.error { color: #cc0000; }
    .con-line.special { color: #ff00ff; }
    .con-line.system { color: #888; font-style: italic; }

    #console-input-row {
        background: #fff;
        border: 1px solid #333;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        flex-shrink: 0;
    }

    #console-prompt {
        color: #000;
        white-space: nowrap;
        flex-shrink: 0;
    }

    #console-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        color: #000;
        caret-color: #000;
    }



        /* Override console-page to always be visible and fill screen */
        #console-page {
            display: flex !important;
            position: fixed;
            inset: 0;
            z-index: 20;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        /* Back button */
        #back-btn {
            position: fixed;
            top: 16px;
            left: 24px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: #333;
            cursor: pointer;
            letter-spacing: 2px;
            z-index: 300;
            transition: color 0.2s;
            user-select: none;
        }
        #back-btn:hover { color: #fff; }

        /* Override close button to go back */
        #console-close { cursor: pointer; }
    </style>
</head>
<body>

<div class="bg-checker"></div>
<div class="crt-effect"></div>
<div class="crt-scanline"></div>
<div class="crt-glitch-band" id="crt-glitch"></div>

<div id="back-btn" onclick="window.location.href='/'">← BACK</div>

<!-- AUDIO -->
<audio id="snd-button2"  src="/button2.wav"  preload="auto"></audio>
<audio id="snd-button3"  src="/button3.wav"  preload="auto"></audio>
<audio id="snd-button9"  src="/button9.wav"  preload="auto"></audio>
<audio id="snd-radio"    src="/radio.wav"    loop></audio>

<div id="console-page" class="active">
    <div id="console-bg"></div>
    <div id="console-wrap">
        <div id="console-titlebar">
            <span>C:\SOURCEEXPLORER&gt;_</span>
            <span id="console-close" onclick="window.location.href='/'">✕</span>
        </div>
        <div id="console-output"></div>
        <div id="console-input-row">
            <span id="console-prompt">login:&nbsp;</span>
            <input id="console-input" type="text" autocomplete="off" spellcheck="false" />
        </div>
    </div>

    <div id="radio-overlay" style="display:none;position:fixed;bottom:80px;right:40px;z-index:400;">
        <img src="/RADIO.gif" style="width:220px;image-rendering:pixelated;" />
    </div>
    <div id="minge-overlay" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:400;">
        <img src="/MINGE.gif" style="width:320px;image-rendering:pixelated;" />
    </div>
</div>

<script>
// ===== AUDIO =====
function playSound(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.currentTime = 0;
    el.play().catch(() => {});
}

// ===== CONSOLE STATE =====
let consoleLoggedIn = false;
let aboutStep = 0;
let radioActive = false;

const ABOUT_STEPS = [
    "SOURCEEXPLORER, a better way to navegate the Source engine!",
    "SOURCEEXPLORER, a better way to navegate the Source engine..",
    "SOURCEEXPLORER IS COMING SOON.",
    "A PASSAGE FOR HIM, A WAY FOR HIM TO NAVEGATE, A WAY FOR HIM TO EXPLORE.",
];

// ===== OUTPUT HELPERS =====
function conPrint(text, cls = 'response') {
    const out = document.getElementById('console-output');
    const line = document.createElement('div');
    line.className = 'con-line ' + cls;
    line.textContent = text;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
}

function conBlank() {
    const out = document.getElementById('console-output');
    const line = document.createElement('div');
    line.className = 'con-line';
    line.innerHTML = '&nbsp;';
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
}

// ===== LOGIN =====
function handleLogin(val) {
    conPrint('login: ' + val, 'echo');
    if (val.trim().toUpperCase() === 'SOURCE') {
        consoleLoggedIn = true;
        document.getElementById('console-prompt').textContent = 'C:\\SOURCEEXPLORER> ';
        conBlank();
        conPrint('Access granted. Welcome, SOURCE.', 'special');
        conPrint('Type HELP for a list of commands.', 'system');
        conBlank();
    } else {
        conBlank();
        conPrint('Login incorrect.', 'error');
        conBlank();
        conPrint('login: ', 'response');
    }
}

// ===== COMMANDS =====
function handleConsoleCommand(raw) {
    const cmd = raw.trim().toUpperCase();

    conPrint('C:\\SOURCEEXPLORER> ' + raw, 'echo');

    if (!cmd) { conBlank(); return; }

    if (cmd === 'HELP') {
        conBlank();
        conPrint('Available commands:', 'system');
        conPrint('  HELP      - Show this help menu');
        conPrint('  ABOUT     - About SOURCEEXPLORER');
        conPrint('  NEXT      - Continue the ABOUT sequence');
        conPrint('  PROGRESS  - Show current progress');
        conPrint('  CLS       - Clear the console');
        conBlank();
        return;
    }

    if (cmd === 'ABOUT') {
        aboutStep = 0;
        conBlank();
        conPrint(ABOUT_STEPS[0], 'special');
        aboutStep = 1;
        conBlank();
        return;
    }

    if (cmd === 'NEXT') {
        if (aboutStep === 0) {
            conBlank();
            conPrint("'NEXT' is not recognized. Type ABOUT first.", 'error');
            conBlank();
            return;
        }
        if (aboutStep < ABOUT_STEPS.length) {
            conBlank();
            conPrint(ABOUT_STEPS[aboutStep], 'special');
            aboutStep++;
            if (aboutStep >= ABOUT_STEPS.length) {
                conBlank();
                conPrint('[END OF SEQUENCE]', 'system');
                aboutStep = 0;
            }
            conBlank();
        }
        return;
    }

    if (cmd === 'PROGRESS') {
        conBlank();
        conPrint('PROGRESS: 0%', 'response');
        conBlank();
        return;
    }

    if (cmd === 'CLS') {
        document.getElementById('console-output').innerHTML = '';
        return;
    }

    if (cmd === 'RADIO') {
        conBlank();
        if (!radioActive) {
            radioActive = true;
            document.getElementById('radio-overlay').style.display = 'block';
            const r = document.getElementById('snd-radio');
            r.volume = 0.6;
            r.play().catch(() => {});
            conPrint('[RADIO SIGNAL DETECTED]', 'special');
        } else {
            closeRadio();
            conPrint('[RADIO SIGNAL LOST]', 'system');
        }
        conBlank();
        return;
    }

    if (cmd === 'MINGE') {
        conBlank();
        document.getElementById('minge-overlay').style.display = 'block';
        conPrint('[ENTITY DETECTED]', 'error');
        conBlank();
        setTimeout(closeMinge, 4000);
        return;
    }

    if (cmd === 'EXIT' || cmd === 'QUIT') {
        conBlank();
        conPrint('Closing terminal...', 'system');
        conBlank();
        setTimeout(() => { window.location.href = '/'; }, 800);
        return;
    }

    conBlank();
    conPrint("'" + raw + "' is not recognized as an internal or external command,", 'error');
    conPrint("operable program or batch file.", 'error');
    conBlank();
}

function closeRadio() {
    radioActive = false;
    document.getElementById('radio-overlay').style.display = 'none';
    const r = document.getElementById('snd-radio');
    r.pause(); r.currentTime = 0;
}

function closeMinge() {
    document.getElementById('minge-overlay').style.display = 'none';
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
    // Boot login prompt
    conPrint('SOURCEEXPLORER TERMINAL v1.0', 'system');
    conPrint('------------------------------', 'system');
    conBlank();
    conPrint('login: ', 'response');

    const inp = document.getElementById('console-input');
    inp.focus();

    const keySounds = ['snd-button2', 'snd-button3', 'snd-button9'];

    inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = inp.value;
            inp.value = '';
            if (!consoleLoggedIn) {
                handleLogin(val);
            } else {
                handleConsoleCommand(val);
            }
        } else if (e.key.length === 1) {
            const s = keySounds[Math.floor(Math.random() * keySounds.length)];
            const el = document.getElementById(s);
            if (el) { el.volume = 0.15; el.currentTime = 0; el.play().catch(() => {}); }
        }
    });

    document.getElementById('console-page').addEventListener('click', () => inp.focus());
});

// ===== CRT GLITCH =====
function triggerGlitch() {
    const el = document.getElementById('crt-glitch');
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 150 + Math.random() * 100);
}
function scheduleGlitch() {
    setTimeout(() => { triggerGlitch(); scheduleGlitch(); }, 4000 + Math.random() * 10000);
}
scheduleGlitch();
</script>
</body>
</html>
