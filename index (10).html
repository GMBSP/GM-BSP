<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHAT — 2003</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg {
            position: fixed; inset: 0;
            background-image: url('/2003.png');
            background-size: cover;
            background-position: center;
            opacity: 0.1; z-index: 0;
        }

        .crt {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 3px;
            pointer-events: none; z-index: 10;
        }
        .crt::after {
            content: ''; display: block; position: absolute; inset: 0;
            background: radial-gradient(rgba(0,0,0,0) 55%, rgba(0,0,0,0.6) 100%);
        }

        /* ===== LOGIN SCREEN ===== */
        #login-screen {
            position: relative; z-index: 5;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            width: 360px;
        }

        .login-title {
            font-family: 'VT323', monospace;
            font-size: 3rem; letter-spacing: 8px; color: #fff;
        }

        .login-sub {
            font-size: 0.6rem; color: #444; letter-spacing: 3px;
            text-align: center;
        }

        .pfp-preview {
            width: 72px; height: 72px;
            border: 2px solid #222;
            background-image: url('/pfp.png');
            background-size: cover;
            background-position: center;
        }

        .login-input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            padding: 10px 14px;
            outline: none;
            letter-spacing: 2px;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: #555; }

        .login-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            padding: 10px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .login-btn:hover { border-color: #fff; }

        .login-error {
            font-size: 0.65rem;
            color: #cc0000;
            letter-spacing: 2px;
            min-height: 16px;
            text-align: center;
        }

        .back-link {
            font-size: 0.55rem; color: #333; letter-spacing: 3px;
            cursor: pointer; transition: color 0.2s;
        }
        .back-link:hover { color: #888; }

        /* ===== CHAT SCREEN ===== */
        #chat-screen {
            display: none;
            position: relative; z-index: 5;
            width: 720px; max-width: 98vw;
            height: 82vh;
            flex-direction: column;
            border: 1px solid #1e1e1e;
            background: rgba(0,0,0,0.88);
        }

        #chat-screen.active { display: flex; }

        .chat-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #111;
            flex-shrink: 0;
        }

        .chat-title {
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            letter-spacing: 6px;
            color: #fff;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-pfp {
            width: 30px; height: 30px;
            border: 1px solid #333;
            background-image: url('/pfp.png');
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .chat-username-display {
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 2px;
        }

        .chat-back {
            font-size: 0.55rem;
            color: #333;
            cursor: pointer;
            letter-spacing: 2px;
            transition: color 0.2s;
        }
        .chat-back:hover { color: #fff; }

        /* Messages */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: #000; }
        #messages::-webkit-scrollbar-thumb { background: #222; }

        .msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .msg-pfp {
            width: 32px; height: 32px;
            border: 1px solid #222;
            background-image: url('/pfp.png');
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-body { display: flex; flex-direction: column; gap: 3px; }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .msg-name {
            font-size: 0.7rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .msg-time {
            font-size: 0.55rem;
            color: #333;
            letter-spacing: 1px;
        }

        .msg-text {
            font-size: 0.82rem;
            color: #aaa;
            line-height: 1.5;
            word-break: break-word;
        }

        .system-msg {
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 2px;
            text-align: center;
            padding: 4px 0;
        }

        /* Input row */
        .chat-input-row {
            display: flex;
            border-top: 1px solid #111;
            flex-shrink: 0;
        }

        #msg-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82rem;
            padding: 14px 18px;
            letter-spacing: 1px;
        }

        #send-btn {
            background: transparent;
            border: none;
            border-left: 1px solid #111;
            color: #444;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            padding: 14px 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        #send-btn:hover { color: #fff; }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="crt"></div>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-title">CHAT</div>
    <div class="login-sub">ENTER A USERNAME TO CONTINUE</div>
    <div class="pfp-preview"></div>
    <input class="login-input" id="username-input" type="text"
           placeholder="USERNAME" maxlength="20" autocomplete="off" spellcheck="false" />
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="joinChat()">[ JOIN ]</button>
    <div class="back-link" onclick="window.location.href='/'">← BACK</div>
</div>

<!-- CHAT -->
<div id="chat-screen">
    <div class="chat-topbar">
        <div class="chat-title">CHAT</div>
        <div class="chat-user-info">
            <div class="chat-pfp"></div>
            <div class="chat-username-display" id="chat-username-display">---</div>
        </div>
        <div class="chat-back" onclick="window.location.href='/'">← BACK</div>
    </div>
    <div id="messages"></div>
    <div class="chat-input-row">
        <input id="msg-input" type="text" placeholder="TYPE A MESSAGE..."
               maxlength="300" autocomplete="off" spellcheck="false" />
        <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── REPLACE WITH YOUR FIREBASE CONFIG ──
const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
};
// ───────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const msgRef = ref(db, 'messages');

// ── BANNED WORDS ──
const BANNED = [
    // Slurs & hate speech
    "nigger","nigga","niger","n1gger","n1gga","nigg","niga",
    "faggot","fag","f4g","f4ggot","kike","spic","chink","gook",
    "retard","tranny","cunt","whore","slut","bitch",
    // Site-specific
    "2003","source","sourceengine","sourceexplorer","console",
    // Common profanity
    "fuck","f*ck","f**k","shit","sh1t","ass","asshole","bastard","dick","cock","pussy"
];

function containsBanned(str) {
    const clean = str.toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
    return BANNED.some(w => clean.includes(w.replace(/[^a-z0-9]/g, '')));
}

let myUsername = null;

// Expose to global scope for onclick handlers
window.joinChat = function() {
    const raw = document.getElementById('username-input').value.trim();
    const err = document.getElementById('login-error');

    if (!raw) { err.textContent = 'USERNAME CANNOT BE EMPTY.'; return; }
    if (raw.length < 2) { err.textContent = 'TOO SHORT. MIN 2 CHARACTERS.'; return; }
    if (raw.length > 20) { err.textContent = 'TOO LONG. MAX 20 CHARACTERS.'; return; }
    if (!/^[a-zA-Z0-9_\-\.]+$/.test(raw)) {
        err.textContent = 'LETTERS, NUMBERS, _ - . ONLY.'; return;
    }
    if (containsBanned(raw)) {
        err.textContent = 'THAT USERNAME IS NOT ALLOWED.'; return;
    }

    myUsername = raw.toUpperCase();
    err.textContent = '';
    document.getElementById('chat-username-display').textContent = myUsername;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').classList.add('active');
    document.getElementById('msg-input').focus();

    // Post join message
    push(msgRef, {
        type: 'system',
        text: myUsername + ' HAS JOINED.',
        ts: serverTimestamp()
    });

    // Listen for messages
    onChildAdded(msgRef, snap => {
        const data = snap.val();
        if (!data) return;
        if (data.type === 'system') {
            appendSystem(data.text);
        } else {
            appendMessage(data.user, data.text, data.ts);
        }
    });
};

window.sendMessage = function() {
    const inp = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text || !myUsername) return;

    if (containsBanned(text)) {
        appendSystem('[ MESSAGE BLOCKED — INAPPROPRIATE CONTENT ]');
        inp.value = '';
        return;
    }

    push(msgRef, {
        type: 'message',
        user: myUsername,
        text: text,
        ts: serverTimestamp()
    });
    inp.value = '';
};

// Send on Enter
document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.sendMessage();
});
document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.joinChat();
});

function appendMessage(user, text, ts) {
    const msgs = document.getElementById('messages');
    const time = ts ? new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `
        <div class="msg-pfp"></div>
        <div class="msg-body">
            <div class="msg-meta">
                <span class="msg-name">${escHtml(user)}</span>
                <span class="msg-time">${time}</span>
            </div>
            <div class="msg-text">${escHtml(text)}</div>
        </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

function appendSystem(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
